<cle></cle><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Error</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: #1e293b; border: 1px solid #ef4444; border-radius: 16px; padding: 40px; max-width: 560px; text-align: center; }
        .error-icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.4rem; font-weight: 700; color: #ef4444; margin-bottom: 12px; }
        .error-msg { background: #0f172a; border-radius: 8px; padding: 14px; font-size: 0.82rem; color: #94a3b8; font-family: monospace; text-align: left; margin: 16px 0; word-break: break-all; }
        .hint { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; }
        .btn { background: #6366f1; color: #fff; border: none; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-decoration: none; display: inline-block; margin: 4px; }
        .btn:hover { background: #4f46e5; }
        .btn-secondary { background: #334155; }
        .btn-secondary:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">⚠️</div>
        <h1>Could not load dashboard data</h1>
        <div class="error-msg">{{ error }}</div>
        <p class="hint">This usually means the Google Sheets credentials are invalid or expired. Check your <code>service_account.json</code> or the <code>GOOGLE_SERVICE_ACCOUNT</code> environment variable.</p>
        <a href="/refresh" class="btn">🔄 Retry</a>
        <a href="/" class="btn btn-secondary">← Home</a>
    </div>
</body>
</html>
